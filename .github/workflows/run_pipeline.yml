name: Run Data Pipeline (Crawl & Train)

on:
  workflow_run:
    workflows: ["Sync to Hugging Face Spaces"]
    types:
      - completed
  schedule:
    # Chạy tự động lúc 00:00 hàng ngày (Giờ UTC, tức khoảng 07:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép nhấn chạy tay trên giao diện GitHub Actions

jobs:
  run-pipeline:
    # Chỉ chạy nếu là chạy định kỳ, chạy tay, HOẶC workflow deploy trước đó thành công
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline steps
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
          # Nếu có dùng cert CA
          # DB_SSLROOTCERT: ${{ secrets.DB_SSLROOTCERT }}
        run: |
          # Kiểm tra sự tồn tại của các bảng trong Database
          if python -m src.db.check_db; then
            echo "Database tables already exist. Skipping Step 1 (Init Schema) and Step 2 (Crawl)."
          else
            echo "Database tables do not exist. Starting initial setup (Schema & Crawl)..."
            
            echo "==== Step 1: Initialize/Update DB Schema ===="
            python -m src.db.init_schema
            
            echo "==== Step 2: Crawl new reviews ===="
            python run_crawler.py
          fi
          
          echo "==== Step 3: Run data preprocessing ===="
          python -m src.preprocessing.run_preprocessing
          
          echo "==== Step 4: Train sentiment model ===="
          python -m src.models.train_sentiment
          
          echo "==== Step 5: Predict & Update labels in Database ===="
          python -m src.models.predict
